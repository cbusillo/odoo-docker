name: Build And Publish Images

on:
  workflow_dispatch:
    inputs:
      publish_stable:
        description: Publish stable 19.0 tags in addition to sha/nightly tags.
        required: false
        default: true
        type: boolean
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - scripts/**
      - .github/workflows/build.yml
      - README.md
  push:
    branches: [main]
    paths:
      - Dockerfile
      - scripts/**
      - .github/workflows/build.yml
      - README.md
  schedule:
    - cron: "17 4 * * *"

concurrency:
  group: odoo-docker-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  DOCKER_BUILD_SUMMARY: false
  DOCKER_BUILD_RECORD_UPLOAD: false

jobs:
  resolve_source:
    runs-on: [self-hosted, linux, x64, chris-testing]
    permissions:
      contents: read
    outputs:
      odoo_source_rev: ${{ steps.odoo_source.outputs.value }}
    steps:
      - name: Resolve Odoo source revision
        id: odoo_source
        run: |
          set -euo pipefail
          source_revision="$(git ls-remote https://github.com/odoo/odoo.git refs/heads/19.0 | awk '{print $1}')"
          if [ -z "${source_revision}" ]; then
            echo "Failed to resolve Odoo source revision" >&2
            exit 1
          fi
          echo "value=${source_revision}" >> "${GITHUB_OUTPUT}"
          echo "Resolved Odoo source revision: ${source_revision}"

  verify:
    runs-on: [self-hosted, linux, x64, chris-testing]
    needs: resolve_source
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - target: runtime
            suffix: runtime
            smoke_script: scripts/smoke-runtime.sh
          - target: runtime-devtools
            suffix: devtools
            smoke_script: scripts/smoke-devtools.sh
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          keep-state: true
          cleanup: false

      - name: Build verification image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          pull: true
          load: true
          platforms: linux/amd64
          tags: odoo-docker:verify-${{ matrix.suffix }}
          build-args: |
            ODOO_SOURCE_REF=19.0
            ODOO_SOURCE_REV=${{ needs.resolve_source.outputs.odoo_source_rev }}

      - name: Smoke test verification image
        run: ${{ matrix.smoke_script }} odoo-docker:verify-${{ matrix.suffix }}

  publish_platform:
    runs-on: [self-hosted, linux, x64, chris-testing]
    needs: [resolve_source, verify]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - target: runtime
            suffix: runtime
            platform: linux/amd64
            platform_suffix: amd64
          - target: runtime
            suffix: runtime
            platform: linux/arm64
            platform_suffix: arm64
          - target: runtime-devtools
            suffix: devtools
            platform: linux/amd64
            platform_suffix: amd64
          - target: runtime-devtools
            suffix: devtools
            platform: linux/arm64
            platform_suffix: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        with:
          keep-state: true
          cleanup: false

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build platform tag set
        id: tags
        env:
          DISPATCH_PUBLISH_STABLE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_stable || 'false' }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          nightly_date="$(date -u +%Y%m%d)"
          image_root="ghcr.io/${GITHUB_REPOSITORY}"

          tags=("${image_root}:sha-${short_sha}-${{ matrix.suffix }}")

          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            tags+=("${image_root}:nightly-${{ matrix.suffix }}" "${image_root}:nightly-${nightly_date}-${{ matrix.suffix }}")
          fi

          publish_stable="false"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            publish_stable="true"
          fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${DISPATCH_PUBLISH_STABLE}" = "true" ]; then
            publish_stable="true"
          fi

          if [ "${publish_stable}" = "true" ]; then
            tags+=("${image_root}:19.0-${{ matrix.suffix }}")
          fi

          platform_tags=()
          for tag in "${tags[@]}"; do
            platform_tags+=("${tag}-${{ matrix.platform_suffix }}")
          done

          {
            echo "value<<EOF"
            printf '%s\n' "${platform_tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish image for platform
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          pull: true
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ steps.tags.outputs.value }}
          build-args: |
            ODOO_SOURCE_REF=19.0
            ODOO_SOURCE_REV=${{ needs.resolve_source.outputs.odoo_source_rev }}

  publish_manifest:
    runs-on: [self-hosted, linux, x64, chris-testing]
    needs: publish_platform
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - suffix: runtime
          - suffix: devtools
    steps:
      - uses: docker/setup-buildx-action@v3
        with:
          keep-state: true
          cleanup: false

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build final tag set
        id: tags
        env:
          DISPATCH_PUBLISH_STABLE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_stable || 'false' }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          nightly_date="$(date -u +%Y%m%d)"
          image_root="ghcr.io/${GITHUB_REPOSITORY}"

          tags=("${image_root}:sha-${short_sha}-${{ matrix.suffix }}")

          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            tags+=("${image_root}:nightly-${{ matrix.suffix }}" "${image_root}:nightly-${nightly_date}-${{ matrix.suffix }}")
          fi

          publish_stable="false"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            publish_stable="true"
          fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${DISPATCH_PUBLISH_STABLE}" = "true" ]; then
            publish_stable="true"
          fi

          if [ "${publish_stable}" = "true" ]; then
            tags+=("${image_root}:19.0-${{ matrix.suffix }}")
          fi

          {
            echo "value<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Merge amd64 and arm64 manifests
        run: |
          set -euo pipefail

          while IFS= read -r final_tag; do
            if [ -z "${final_tag}" ]; then
              continue
            fi

            amd64_tag="${final_tag}-amd64"
            arm64_tag="${final_tag}-arm64"

            docker buildx imagetools create \
              --tag "${final_tag}" \
              "${amd64_tag}" \
              "${arm64_tag}"
          done <<< "${{ steps.tags.outputs.value }}"

  trigger_enterprise:
    runs-on: [self-hosted, linux, x64, chris-testing]
    needs: publish_manifest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Trigger enterprise build
        env:
          DISPATCH_TOKEN: ${{ secrets.ENTERPRISE_REPO_DISPATCH_TOKEN }}
          DISPATCH_PUBLISH_STABLE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_stable || 'false' }}
        run: |
          set -euo pipefail

          if [ -z "${DISPATCH_TOKEN:-}" ]; then
            echo "Missing ENTERPRISE_REPO_DISPATCH_TOKEN secret" >&2
            exit 1
          fi

          short_sha="${GITHUB_SHA::12}"
          runtime_image="ghcr.io/${GITHUB_REPOSITORY}:sha-${short_sha}-runtime"
          devtools_image="ghcr.io/${GITHUB_REPOSITORY}:sha-${short_sha}-devtools"

          publish_stable="false"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            publish_stable="true"
          fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${DISPATCH_PUBLISH_STABLE}" = "true" ]; then
            publish_stable="true"
          fi

          request_payload="$(jq -cn \
            --arg ref "main" \
            --arg runtime "${runtime_image}" \
            --arg devtools "${devtools_image}" \
            --arg stable "${publish_stable}" \
            '{
              ref: $ref,
              inputs: {
                publish_stable: $stable,
                base_runtime_image: $runtime,
                base_devtools_image: $devtools
              }
            }')"

          curl --fail --show-error --silent \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/cbusillo/odoo-enterprise-docker/actions/workflows/build.yml/dispatches \
            -d "${request_payload}"
