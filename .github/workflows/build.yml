name: Build And Publish Images

on:
  workflow_dispatch:
    inputs:
      publish_stable:
        description: Publish stable 19.0 tags in addition to sha/nightly tags.
        required: false
        default: true
        type: boolean
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - scripts/**
      - .github/workflows/build.yml
      - README.md
  push:
    branches: [main]
    paths:
      - Dockerfile
      - scripts/**
      - .github/workflows/build.yml
      - README.md
  schedule:
    - cron: "17 4 * * *"

concurrency:
  group: odoo-docker-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  DOCKER_BUILD_SUMMARY: false
  DOCKER_BUILD_RECORD_UPLOAD: false

jobs:
  resolve_source:
    runs-on: [self-hosted, linux, x64, chris-testing]
    permissions:
      contents: read
    outputs:
      odoo_source_rev: ${{ steps.odoo_source.outputs.value }}
    steps:
      - name: Resolve Odoo source revision
        id: odoo_source
        run: |
          set -euo pipefail
          source_revision="$(git ls-remote https://github.com/odoo/odoo.git refs/heads/19.0 | awk '{print $1}')"
          if [ -z "${source_revision}" ]; then
            echo "Failed to resolve Odoo source revision" >&2
            exit 1
          fi
          echo "value=${source_revision}" >> "${GITHUB_OUTPUT}"
          echo "Resolved Odoo source revision: ${source_revision}"

  verify:
    runs-on: [self-hosted, linux, x64, chris-testing]
    needs: resolve_source
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - target: runtime
            suffix: runtime
            smoke_script: scripts/smoke-runtime.sh
          - target: runtime-devtools
            suffix: devtools
            smoke_script: scripts/smoke-devtools.sh
    steps:
      - uses: actions/checkout@v4

      - id: setup_buildx_verify
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Validate odoo-bin wrapper behavior
        run: scripts/test-odoo-bin-wrapper.sh

      - name: Build verification image (attempt 1)
        id: verify_build_attempt_1
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.setup_buildx_verify.outputs.name }}
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          pull: true
          load: true
          platforms: linux/amd64
          tags: odoo-docker:verify-${{ matrix.suffix }}
          cache-from: type=gha,scope=odoo-docker-verify-${{ matrix.target }}-amd64
          cache-to: type=gha,mode=max,scope=odoo-docker-verify-${{ matrix.target }}-amd64,ignore-error=true
          provenance: false
          sbom: false
          build-args: |
            ODOO_SOURCE_REF=19.0
            ODOO_SOURCE_REV=${{ needs.resolve_source.outputs.odoo_source_rev }}

      - name: Build verification image (attempt 2, no cache import)
        id: verify_build_attempt_2
        if: steps.verify_build_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.setup_buildx_verify.outputs.name }}
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          pull: true
          load: true
          platforms: linux/amd64
          tags: odoo-docker:verify-${{ matrix.suffix }}
          provenance: false
          sbom: false
          build-args: |
            ODOO_SOURCE_REF=19.0
            ODOO_SOURCE_REV=${{ needs.resolve_source.outputs.odoo_source_rev }}

      - name: Fail verification build after retries
        if: steps.verify_build_attempt_1.outcome == 'failure' && steps.verify_build_attempt_2.outcome == 'failure'
        run: |
          echo "Verification build failed after two attempts" >&2
          exit 1

      - name: Smoke test verification image
        run: ${{ matrix.smoke_script }} odoo-docker:verify-${{ matrix.suffix }}

  publish:
    runs-on: [self-hosted, linux, x64, chris-testing]
    needs: [resolve_source, verify]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - target: runtime
            suffix: runtime
          - target: runtime-devtools
            suffix: devtools
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - id: setup_buildx_publish
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build tag set
        id: tags
        env:
          DISPATCH_PUBLISH_STABLE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_stable || 'false' }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          nightly_date="$(date -u +%Y%m%d)"
          image_root="ghcr.io/${GITHUB_REPOSITORY}"

          tags=("${image_root}:sha-${short_sha}-${{ matrix.suffix }}")

          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            tags+=("${image_root}:nightly-${{ matrix.suffix }}" "${image_root}:nightly-${nightly_date}-${{ matrix.suffix }}")
          fi

          publish_stable="false"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            publish_stable="true"
          fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${DISPATCH_PUBLISH_STABLE}" = "true" ]; then
            publish_stable="true"
          fi

          if [ "${publish_stable}" = "true" ]; then
            tags+=("${image_root}:19.0-${{ matrix.suffix }}")
          fi

          {
            echo "value<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish image (attempt 1)
        id: publish_attempt_1
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.setup_buildx_publish.outputs.name }}
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.value }}
          cache-from: type=gha,scope=odoo-docker-${{ matrix.target }}-multiarch
          cache-to: type=gha,mode=max,scope=odoo-docker-${{ matrix.target }}-multiarch,ignore-error=true
          provenance: false
          sbom: false
          build-args: |
            ODOO_SOURCE_REF=19.0
            ODOO_SOURCE_REV=${{ needs.resolve_source.outputs.odoo_source_rev }}

      - name: Refresh ghcr login before retry
        if: steps.publish_attempt_1.outcome == 'failure'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image (attempt 2)
        id: publish_attempt_2
        if: steps.publish_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.setup_buildx_publish.outputs.name }}
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.value }}
          cache-from: type=gha,scope=odoo-docker-${{ matrix.target }}-multiarch
          cache-to: type=gha,mode=max,scope=odoo-docker-${{ matrix.target }}-multiarch,ignore-error=true
          provenance: false
          sbom: false
          build-args: |
            ODOO_SOURCE_REF=19.0
            ODOO_SOURCE_REV=${{ needs.resolve_source.outputs.odoo_source_rev }}

      - name: Refresh ghcr login before final retry
        if: steps.publish_attempt_1.outcome == 'failure' && steps.publish_attempt_2.outcome == 'failure'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image (attempt 3)
        id: publish_attempt_3
        if: steps.publish_attempt_1.outcome == 'failure' && steps.publish_attempt_2.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.setup_buildx_publish.outputs.name }}
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.value }}
          provenance: false
          sbom: false
          build-args: |
            ODOO_SOURCE_REF=19.0
            ODOO_SOURCE_REV=${{ needs.resolve_source.outputs.odoo_source_rev }}

  trigger_enterprise:
    runs-on: [self-hosted, linux, x64, chris-testing]
    needs: publish
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Trigger enterprise build
        env:
          DISPATCH_TOKEN: ${{ secrets.ENTERPRISE_REPO_DISPATCH_TOKEN }}
          DISPATCH_PUBLISH_STABLE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_stable || 'false' }}
        run: |
          set -euo pipefail

          if [ -z "${DISPATCH_TOKEN:-}" ]; then
            echo "Missing ENTERPRISE_REPO_DISPATCH_TOKEN secret" >&2
            exit 1
          fi

          short_sha="${GITHUB_SHA::12}"
          runtime_image="ghcr.io/${GITHUB_REPOSITORY}:sha-${short_sha}-runtime"
          devtools_image="ghcr.io/${GITHUB_REPOSITORY}:sha-${short_sha}-devtools"

          publish_stable="false"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            publish_stable="true"
          fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${DISPATCH_PUBLISH_STABLE}" = "true" ]; then
            publish_stable="true"
          fi

          request_payload="$(jq -cn \
            --arg ref "main" \
            --arg runtime "${runtime_image}" \
            --arg devtools "${devtools_image}" \
            --arg stable "${publish_stable}" \
            '{
              ref: $ref,
              inputs: {
                publish_stable: $stable,
                base_runtime_image: $runtime,
                base_devtools_image: $devtools
              }
            }')"

          max_dispatch_attempts=3
          dispatch_attempt=1

          while true; do
            if curl --fail --show-error --silent \
              --connect-timeout 15 \
              --max-time 60 \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/cbusillo/odoo-enterprise-docker/actions/workflows/build.yml/dispatches \
              -d "${request_payload}"; then
              echo "Enterprise dispatch succeeded on attempt ${dispatch_attempt}" >&2
              break
            fi

            if [ "${dispatch_attempt}" -ge "${max_dispatch_attempts}" ]; then
              echo "Enterprise dispatch failed after ${max_dispatch_attempts} attempts" >&2
              exit 1
            fi

            backoff_seconds=$((dispatch_attempt * 10))
            echo "Enterprise dispatch attempt ${dispatch_attempt} failed; retrying in ${backoff_seconds}s" >&2
            sleep "${backoff_seconds}"
            dispatch_attempt=$((dispatch_attempt + 1))
          done
